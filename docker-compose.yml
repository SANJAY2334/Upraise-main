version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: uprise-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uprise_db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-uprise_production_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uprise_db_user} -d ${POSTGRES_DB:-uprise_production_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uprise-backend-server
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
