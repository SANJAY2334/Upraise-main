version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: uprise-postgres
    restart: always
    environment:
      POSTGRES_USER: uprise_db_user
      POSTGRES_PASSWORD: uprise_secure_password_replace_me
      POSTGRES_DB: uprise_production_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uprise_db_user -d uprise_production_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uprise-backend-server
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://uprise_db_user:uprise_secure_password_replace_me@database:5432/uprise_production_db?schema=public
      CLIENT_URL: http://localhost:4000
      SITE_URL: https://uprise.example.com
      JWT_ACCESS_SECRET: change_me_to_a_long_secure_hash_in_production_access
      JWT_REFRESH_SECRET: change_me_to_a_long_secure_hash_in_production_refresh
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
